<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Infrastructure Digital Twin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease;
        }
        
        .splash-container {
            text-align: center;
            color: white;
            padding: 40px;
            max-width: 600px;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        p {
            font-size: 1.2em;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }
        
        .redirect-message {
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            display: inline-block;
            margin-top: 20px;
        }
        
        .redirect-message i {
            margin-right: 10px;
        }
        
        .links {
            margin-top: 40px;
        }
        
        .links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .links a:hover {
            background: white;
            color: #667eea;
            border-color: white;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .logo { font-size: 60px; }
            .links a { display: block; margin: 10px 0; }
        }
    </style>
    <meta http-equiv="refresh" content="3;url=login.html">
</head>
<body>
    <div class="splash-container">
        <div class="logo">🏗️</div>
        <h1>Urban Infrastructure Digital Twin</h1>
        <p>Smart City Management Platform for Indian Metros</p>
        <div class="spinner"></div>
        <div class="redirect-message">
            <i class="fas fa-arrow-right"></i>
            Redirecting to login page...
        </div>
        
        <div class="links">
            <a href="login.html" onclick="event.preventDefault(); window.location.href='login.html'">
                <i class="fas fa-sign-in-alt"></i> Go to Login Now
            </a>
            <a href="register.html" onclick="event.preventDefault(); window.location.href='register.html'">
                <i class="fas fa-user-plus"></i> Create Account
            </a>
        </div>
    </div>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        // Fallback redirect if meta refresh fails
        setTimeout(function() {
            window.location.href = 'login.html';
        }, 3000);
        
        // Check if already logged in
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        
        if (token && user) {
            // If already logged in, go directly to dashboard
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
